<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="theme-color" content="#0a1428">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Electrolize&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrapper header-row">
      <a class="site-logo" href="{{ '/' | relative_url }}">
        <span class="hex-icon">⬡</span>
        <span class="site-title"><span class="cap">O</span>mni<span class="cap">C</span>ore</span>
      </a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <nav class="site-nav" id="site-nav">
        {% for link in site.navigation %}
          <a href="{{ link.url | relative_url }}"{% if page.url == link.url %} class="active"{% endif %}>{{ link.title }}</a>
        {% endfor %}
      </nav>
    </div>
  </header>
  <main class="wrapper">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <p>Built by <a href="https://github.com/LOLinDark" target="_blank" rel="noopener">LOLinDark</a></p>
      <p>OmniCore is a fan-made project. Star Citizen® is a registered trademark of Cloud Imperium Rights LLC.</p>
    </div>
  </footer>
  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.getElementById('site-nav').classList.toggle('open');
    });
  </script>
</body>
</html>
