<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-CORE</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0b7285">
        <script>
            // GitHub Pages SPA restore: convert /?/path back to /path before React Router boots.
            (function (l) {
                if (!l.search || l.search.length < 2 || l.search[1] !== '/') return;
                var decoded = l.search
                    .slice(1)
                    .replace(/~and~/g, '&');
                var nextUrl = l.pathname.slice(0, -1) + decoded + l.hash;
                window.history.replaceState(null, '', nextUrl);
            }(window.location));
        </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
</body>
</html>
